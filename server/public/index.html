<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pizzaria Campy — Peça Agora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <style>
    :root{--pc-primary:#1a1a2e;--pc-accent:#e94560;--pc-accent-dark:#c73550;--pc-gold:#f5a623;--pc-surface:#16213e;--pc-surface-light:#1f2f50;--pc-text:#eef0f2;--pc-text-muted:#8892a4;--pc-success:#27ae60;--pc-border:rgba(255,255,255,0.06);--pc-radius:14px;--pc-radius-sm:10px}
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Sora',sans-serif;background:var(--pc-primary);color:var(--pc-text);min-height:100vh;-webkit-font-smoothing:antialiased}
    .header{background:linear-gradient(135deg,var(--pc-surface) 0%,var(--pc-primary) 100%);border-bottom:1px solid var(--pc-border);padding:20px 16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
    .header-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:12px}.brand-icon{width:44px;height:44px;background:var(--pc-accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
    .brand-text h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}.brand-text span{font-size:11px;color:var(--pc-text-muted);font-weight:400}
    .header-actions{display:flex;gap:8px;align-items:center}

    .icon-btn:hover{background:var(--pc-accent)}.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--pc-accent);color:white;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--pc-primary)}
    .user-btn{width:auto;padding:0 12px;border-radius:20px;font-size:13px;gap:6px;display:flex;align-items:center}
    .user-avatar{width:28px;height:28px;border-radius:50%;background:var(--pc-accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white}
    .tabs{max-width:600px;margin:0 auto;padding:12px 16px 0;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
    .tab{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;background:var(--pc-surface);color:var(--pc-text-muted);border:1px solid var(--pc-border);transition:all 0.2s}
    .tab.active{background:var(--pc-accent);color:white;border-color:var(--pc-accent)}.tab:hover:not(.active){background:var(--pc-surface-light)}
    .main{max-width:600px;margin:0 auto;padding:16px;padding-bottom:100px}
    .menu-grid{display:flex;flex-direction:column;gap:12px}
    .menu-item{background:var(--pc-surface);border:1px solid var(--pc-border);border-radius:var(--pc-radius);padding:16px;cursor:pointer;transition:all 0.2s;display:flex;gap:14px}
    .menu-item:hover{border-color:var(--pc-accent);transform:translateY(-1px)}.menu-item:active{transform:scale(0.98)}
    .menu-item-img{width:80px;height:80px;border-radius:var(--pc-radius-sm);background:var(--pc-surface-light);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
    .menu-item-info{flex:1;min-width:0}.menu-item-name{font-size:15px;font-weight:600;margin-bottom:4px;line-height:1.3}

    .menu-item-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}.menu-item-price{font-size:16px;font-weight:700;color:var(--pc-gold)}
    .add-btn{width:36px;height:36px;border-radius:50%;background:var(--pc-accent);color:white;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}.add-btn:hover{background:var(--pc-accent-dark)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}.modal-overlay.active{display:flex}
    .modal{background:var(--pc-surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;animation:slideUp 0.3s ease}

    .modal-header{padding:20px;border-bottom:1px solid var(--pc-border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--pc-surface)}
    .modal-close{width:36px;height:36px;border-radius:50%;background:var(--pc-surface-light);border:none;color:var(--pc-text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .modal-body{padding:20px}.modal-item-img{width:100%;height:180px;border-radius:var(--pc-radius);background:var(--pc-surface-light);display:flex;align-items:center;justify-content:center;font-size:64px;margin-bottom:16px}
    .modal-item-name{font-size:22px;font-weight:700;margin-bottom:8px}.modal-item-desc{font-size:14px;color:var(--pc-text-muted);line-height:1.5;margin-bottom:16px}
    .size-selector{display:flex;gap:8px;margin-bottom:16px}.size-btn{flex:1;padding:12px 8px;border-radius:var(--pc-radius-sm);background:var(--pc-surface-light);border:2px solid var(--pc-border);color:var(--pc-text);text-align:center;cursor:pointer;transition:all 0.2s}
    .size-btn.active{border-color:var(--pc-accent);background:rgba(233,69,96,0.1)}.size-btn-label{font-size:12px;color:var(--pc-text-muted);margin-bottom:4px}.size-btn-price{font-size:16px;font-weight:700}
    .qty-row{display:flex;align-items:center;justify-content:center;gap:20px;margin:20px 0}.qty-btn{width:44px;height:44px;border-radius:50%;background:var(--pc-surface-light);border:1px solid var(--pc-border);color:var(--pc-text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
    .qty-btn:hover{background:var(--pc-accent)}.qty-value{font-size:24px;font-weight:700;min-width:40px;text-align:center}
    .notes-input{width:100%;padding:12px 16px;border-radius:var(--pc-radius-sm);background:var(--pc-surface-light);border:1px solid var(--pc-border);color:var(--pc-text);font-family:'Sora',sans-serif;font-size:14px;resize:none;min-height:60px}.notes-input::placeholder{color:var(--pc-text-muted)}
    .notes-label{font-size:12px;color:var(--pc-text-muted);margin-bottom:6px;display:block}
    .add-to-cart-btn{width:100%;padding:16px;border-radius:var(--pc-radius);background:var(--pc-accent);color:white;border:none;font-family:'Sora',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:16px}.add-to-cart-btn:hover{background:var(--pc-accent-dark)}.add-to-cart-btn:active{transform:scale(0.98)}
    .cart-panel{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}.cart-panel.active{display:flex}
    .cart-content{background:var(--pc-surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;animation:slideUp 0.3s ease}
    .cart-header{padding:20px;border-bottom:1px solid var(--pc-border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--pc-surface)}.cart-title{font-size:18px;font-weight:700}
    .cart-items{padding:16px 20px}.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--pc-border)}.cart-item:last-child{border-bottom:none}
    .cart-item-info{flex:1}.cart-item-name{font-size:14px;font-weight:600}.cart-item-detail{font-size:12px;color:var(--pc-text-muted)}.cart-item-price{font-weight:600;color:var(--pc-gold)}
    .cart-item-qty{display:flex;align-items:center;gap:8px}.cart-qty-btn{width:28px;height:28px;border-radius:50%;background:var(--pc-surface-light);border:1px solid var(--pc-border);color:var(--pc-text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}.cart-qty-btn:hover{background:var(--pc-accent)}
    .cart-summary{padding:16px 20px;border-top:1px solid var(--pc-border)}.summary-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px}.summary-row.total{font-size:18px;font-weight:700;margin-top:12px;padding-top:12px;border-top:1px solid var(--pc-border)}.summary-label{color:var(--pc-text-muted)}.summary-value{font-weight:600}.summary-total-value{color:var(--pc-gold)}
    .checkout-form{padding:16px 20px}.form-group{margin-bottom:16px}.form-label{font-size:12px;color:var(--pc-text-muted);margin-bottom:6px;display:block;font-weight:500}
    .form-input{width:100%;padding:14px 16px;border-radius:var(--pc-radius-sm);background:var(--pc-surface-light);border:1px solid var(--pc-border);color:var(--pc-text);font-family:'Sora',sans-serif;font-size:14px;transition:border-color 0.2s}.form-input:focus{outline:none;border-color:var(--pc-accent)}.form-input::placeholder{color:var(--pc-text-muted)}.form-input[readonly]{opacity:0.7}
    .payment-methods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}.payment-method{padding:14px 12px;border-radius:var(--pc-radius-sm);background:var(--pc-surface-light);border:2px solid var(--pc-border);color:var(--pc-text);text-align:center;cursor:pointer;transition:all 0.2s;font-size:13px;font-weight:500}
    .payment-method.active{border-color:var(--pc-accent);background:rgba(233,69,96,0.1)}.payment-method-icon{font-size:22px;margin-bottom:4px}
    .checkout-btn{width:100%;padding:16px;border-radius:var(--pc-radius);background:var(--pc-success);color:white;border:none;font-family:'Sora',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s}.checkout-btn:hover{filter:brightness(1.1)}.checkout-btn:disabled{opacity:0.5;cursor:not-allowed}
    .auth-panel{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:250;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}.auth-panel.active{display:flex}
    .auth-card{background:var(--pc-surface);border-radius:20px;width:90%;max-width:400px;padding:32px 24px;animation:slideUp 0.3s ease}
    .auth-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:8px}.auth-subtitle{font-size:13px;color:var(--pc-text-muted);text-align:center;margin-bottom:24px}
    .auth-tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--pc-surface-light);border-radius:10px;padding:4px}
    .auth-tab{flex:1;padding:10px;text-align:center;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;color:var(--pc-text-muted);transition:all 0.2s}.auth-tab.active{background:var(--pc-accent);color:white}
    .auth-link{text-align:center;margin-top:16px;font-size:13px;color:var(--pc-text-muted)}.auth-link a{color:var(--pc-accent);cursor:pointer;text-decoration:none}
    .tracking-container{padding:20px}.tracking-order-id{text-align:center;font-size:14px;color:var(--pc-text-muted);margin-bottom:24px}.tracking-order-id span{font-weight:700;color:var(--pc-gold)}
    .tracking-steps{position:relative;padding-left:30px}.tracking-steps::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:var(--pc-border)}
    .tracking-step{position:relative;padding:12px 0;padding-left:20px}.tracking-step-dot{position:absolute;left:-30px;top:14px;width:24px;height:24px;border-radius:50%;background:var(--pc-surface-light);border:2px solid var(--pc-border);display:flex;align-items:center;justify-content:center;font-size:12px;z-index:1}
    .tracking-step.completed .tracking-step-dot{background:var(--pc-success);border-color:var(--pc-success);color:white}.tracking-step.active .tracking-step-dot{background:var(--pc-accent);border-color:var(--pc-accent);color:white;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(233,69,96,0.4)}50%{box-shadow:0 0 0 8px rgba(233,69,96,0)}}
    .tracking-step-label{font-size:14px;font-weight:600}.tracking-step-time{font-size:11px;color:var(--pc-text-muted);margin-top:2px}
    .empty-state{text-align:center;padding:40px 20px;color:var(--pc-text-muted)}.empty-state-icon{font-size:48px;margin-bottom:12px;opacity:0.5}.empty-state-text{font-size:14px}
    .loading{text-align:center;padding:40px;color:var(--pc-text-muted)}
    .success-screen{text-align:center;padding:40px 20px}.success-icon{font-size:64px;margin-bottom:16px;animation:bounce 0.6s ease}@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
    .success-title{font-size:22px;font-weight:700;margin-bottom:8px}.success-subtitle{font-size:14px;color:var(--pc-text-muted);margin-bottom:24px;line-height:1.5}
    .success-order-id{background:var(--pc-surface-light);border-radius:var(--pc-radius-sm);padding:12px 20px;display:inline-block;font-size:16px;font-weight:600;color:var(--pc-gold);margin-bottom:20px}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--pc-success);color:white;padding:12px 24px;border-radius:30px;font-size:13px;font-weight:500;z-index:300;animation:toastIn 0.3s ease;box-shadow:0 8px 32px rgba(0,0,0,0.3)}@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .hidden{display:none!important}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--pc-surface-light);border-radius:4px}
    .cat-emoji{font-size:18px;margin-right:6px}
    .order-card{background:var(--pc-surface);border:1px solid var(--pc-border);border-radius:var(--pc-radius);padding:16px;margin-bottom:12px;cursor:pointer;transition:border-color 0.2s}.order-card:hover{border-color:var(--pc-accent)}
    .order-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.order-card-id{font-weight:700;font-size:15px}
    .order-card-status{font-size:12px;padding:4px 10px;border-radius:12px;font-weight:500}
    .status-pending{background:rgba(245,166,35,0.2);color:var(--pc-gold)}.status-confirmed{background:rgba(39,174,96,0.2);color:var(--pc-success)}.status-preparing{background:rgba(233,69,96,0.2);color:var(--pc-accent)}
    .status-out_for_delivery{background:rgba(100,149,237,0.2);color:cornflowerblue}.status-delivered{background:rgba(39,174,96,0.2);color:var(--pc-success)}.status-cancelled{background:rgba(255,255,255,0.1);color:var(--pc-text-muted)}
    .order-card-items{font-size:13px;color:var(--pc-text-muted);margin-bottom:8px;line-height:1.4}.order-card-total{font-weight:700;color:var(--pc-gold)}
    .whatsapp-float{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:#25D366;color:white;border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);z-index:150;transition:transform 0.2s}.whatsapp-float:hover{transform:scale(1.1)}
    .user-menu{position:absolute;top:50px;right:16px;background:var(--pc-surface);border:1px solid var(--pc-border);border-radius:var(--pc-radius-sm);padding:8px;min-width:180px;z-index:150;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.3)}.user-menu.active{display:block}
    .user-menu-item{padding:10px 12px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--pc-text);transition:background 0.2s}.user-menu-item:hover{background:var(--pc-surface-light)}.user-menu-divider{height:1px;background:var(--pc-border);margin:4px 0}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">🍕</div>
        <div class="brand-text"><h1>Pizzaria Campy</h1><span>Arte em cada fatia</span></div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-orders" title="Meus Pedidos"><i class="ph ph-receipt"></i></button>
        <button class="icon-btn" id="btn-cart" title="Carrinho"><i class="ph ph-shopping-cart"></i><span class="cart-badge hidden" id="cart-badge">0</span></button>
        <button class="icon-btn user-btn" id="btn-user" title="Minha Conta"><i class="ph ph-user"></i></button>
      </div>
    </div>
    <div class="user-menu" id="user-menu">
      <div id="user-menu-content"></div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="main">
    <div id="view-menu"><div class="menu-grid" id="menu-grid"><div class="loading">Carregando cardápio...</div></div></div>
    <div id="view-orders" class="hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="font-size:18px;font-weight:700">Meus Pedidos</h2><button class="icon-btn" onclick="showView('menu')" style="width:auto;padding:8px 16px;border-radius:20px;font-size:13px"><i class="ph ph-arrow-left" style="margin-right:4px"></i> Voltar</button></div>
      <div id="orders-list"><div class="loading">Carregando...</div></div>
    </div>
    <div id="view-tracking" class="hidden"></div>
    <div id="view-success" class="hidden"></div>
  </div>
  <div class="modal-overlay" id="modal-item"><div class="modal"><div class="modal-header"><span style="font-weight:600">Personalizar</span><button class="modal-close" onclick="closeModal('modal-item')"><i class="ph ph-x"></i></button></div><div class="modal-body" id="modal-item-body"></div></div></div>
  <div class="cart-panel" id="cart-panel"><div class="cart-content"><div class="cart-header"><span class="cart-title">🛒 Seu Pedido</span><button class="modal-close" onclick="closeCart()"><i class="ph ph-x"></i></button></div><div id="cart-body"></div></div></div>
  <div class="auth-panel" id="auth-panel"><div class="auth-card"><div class="auth-title" id="auth-title">Entrar</div><div class="auth-subtitle" id="auth-subtitle">Acesse sua conta para ver seus pedidos</div><div class="auth-tabs"><div class="auth-tab active" id="tab-login" onclick="showAuthTab('login')">Entrar</div><div class="auth-tab" id="tab-register" onclick="showAuthTab('register')">Cadastrar</div></div><div id="auth-form"></div></div></div>
  <button class="whatsapp-float" id="btn-whatsapp"><i class="ph ph-whatsapp-logo"></i></button>

  <script>
    const API_BASE = window.location.origin;
    let menuItems = [], cart = [], currentCategory = "all", selectedItem = null, selectedSize = null, selectedQty = 1, currentView = "menu", selectedPayment = "pix";
    let currentUser = null, authToken = localStorage.getItem("campy_token");

    const CATEGORY_MAP = { pizza_classica:{label:"Clássicas",emoji:"🍕"},pizza_premium:{label:"Premium",emoji:"✨"},pizza_doce:{label:"Doces",emoji:"🍫"},bebida:{label:"Bebidas",emoji:"🥤"},sobremesa:{label:"Sobremesas",emoji:"🍰"} };
    const PAYMENT_METHODS = [{key:"pix",label:"PIX",icon:"📱"},{key:"credit_card",label:"Crédito",icon:"💳"},{key:"debit_card",label:"Débito",icon:"💳"},{key:"cash",label:"Dinheiro",icon:"💵"}];
    const STATUS_STEPS = [{key:"pending",label:"Aguardando confirmação",icon:"⏳"},{key:"confirmed",label:"Pedido confirmado",icon:"✅"},{key:"preparing",label:"Preparando sua pizza",icon:"👨‍🍳"},{key:"out_for_delivery",label:"Saiu para entrega",icon:"🛵"},{key:"delivered",label:"Entregue",icon:"🎉"}];

    const api = {
      async get(p, auth) { const h = auth ? {"Authorization":"Bearer "+authToken} : {}; const r = await fetch(`${API_BASE}/api/public${p}`, {headers:h}); return r.json(); },
      async post(p, b, auth) { const h = {"Content-Type":"application/json"}; if(auth) h["Authorization"]="Bearer "+authToken; const r = await fetch(`${API_BASE}/api/public${p}`, {method:"POST",headers:h,body:JSON.stringify(b)}); return r.json(); },
    };

    function maskPhone(v){v=v.replace(/\D/g,"").slice(0,11);return v.length<=10?v.replace(/(\d{2})(\d{4})(\d{0,4})/,"($1) $2-$3").replace(/-$/,""):v.replace(/(\d{2})(\d{5})(\d{0,4})/,"($1) $2-$3").replace(/-$/,"");}
    function maskCEP(v){v=v.replace(/\D/g,"").slice(0,8);return v.replace(/(\d{5})(\d{0,3})/,"$1-$2").replace(/-$/,"");}
    async function fetchCEP(cep){const c=cep.replace(/\D/g,"");if(c.length!==8)return null;try{const r=await fetch(`${API_BASE}/api/public/address/cep/${c}`);const d=await r.json();return d.ok?d.address:null;}catch{return null;}}
    async function handleCEPLookup(){const cepEl=document.getElementById("cust-cep"),statusEl=document.getElementById("cep-status");const cep=cepEl?.value||"",clean=cep.replace(/\D/g,"");if(clean.length!==8){statusEl.textContent="Digite o CEP completo";statusEl.style.color="var(--pc-accent)";return;}statusEl.textContent="Buscando...";statusEl.style.color="var(--pc-text-muted)";const data=await fetchCEP(cep);if(!data){statusEl.textContent="CEP não encontrado";statusEl.style.color="var(--pc-accent)";["cust-street","cust-neighborhood"].forEach(id=>{const el=document.getElementById(id);if(el){el.readOnly=false;el.style.opacity="1";el.value="";}});return;}const st=document.getElementById("cust-street"),nb=document.getElementById("cust-neighborhood");if(st){st.value=data.street||"";st.readOnly=true;st.style.opacity="0.7";}if(nb){nb.value=data.neighborhood||"";nb.readOnly=true;nb.style.opacity="0.7";}statusEl.textContent=`✓ ${data.street}, ${data.neighborhood} — ${data.city}/${data.state}`;statusEl.style.color="var(--pc-success)";document.getElementById("cust-number")?.focus();}

    // ====== AUTH ======
    function showAuthTab(tab){
      document.getElementById("tab-login").classList.toggle("active",tab==="login");
      document.getElementById("tab-register").classList.toggle("active",tab==="register");
      document.getElementById("auth-title").textContent=tab==="login"?"Entrar":"Criar Conta";
      document.getElementById("auth-subtitle").textContent=tab==="login"?"Acesse sua conta para ver seus pedidos":"Crie sua conta para acompanhar seus pedidos";
      const form=document.getElementById("auth-form");
      if(tab==="login"){
        form.innerHTML=`
          <div class="form-group"><label class="form-label">Telefone *</label><input class="form-input" id="auth-phone" placeholder="(XX) XXXXX-XXXX" maxlength="15" oninput="this.value=maskPhone(this.value)" /></div>
          <div class="form-group"><label class="form-label">Senha *</label><input class="form-input" id="auth-password" type="password" placeholder="Sua senha" /></div>
          <button class="checkout-btn" onclick="doLogin()" style="margin-top:8px">Entrar</button>
          <div class="auth-link">Não tem conta? <a onclick="showAuthTab('register')">Cadastre-se</a></div>`;
      } else {
        form.innerHTML=`
          <div class="form-group"><label class="form-label">Nome completo *</label><input class="form-input" id="auth-name" placeholder="Seu nome" /></div>
          <div class="form-group"><label class="form-label">Telefone *</label><input class="form-input" id="auth-phone" placeholder="(XX) XXXXX-XXXX" maxlength="15" oninput="this.value=maskPhone(this.value)" /></div>
          <div class="form-group"><label class="form-label">E-mail (opcional)</label><input class="form-input" id="auth-email" type="email" placeholder="seu@email.com" /></div>
          <div class="form-group"><label class="form-label">Senha *</label><input class="form-input" id="auth-password" type="password" placeholder="Mínimo 4 caracteres" /></div>
          <button class="checkout-btn" onclick="doRegister()" style="margin-top:8px">Criar Conta</button>
          <div class="auth-link">Já tem conta? <a onclick="showAuthTab('login')">Entrar</a></div>`;
      }
    }

    async function doLogin(){
      const phone=document.getElementById("auth-phone")?.value.trim();
      const password=document.getElementById("auth-password")?.value;
      if(!phone||!password){showToast("⚠️ Preencha telefone e senha");return;}
      const r=await api.post("/auth/login",{phone:phone.replace(/\D/g,""),password});
      if(r.ok){authToken=r.token;localStorage.setItem("campy_token",r.token);currentUser=r.user;closeAuth();showToast("✅ Bem-vindo, "+r.user.name+"!");updateUserMenu();}
      else showToast("⚠️ "+r.error);
    }

    async function doRegister(){
      const name=document.getElementById("auth-name")?.value.trim();
      const phone=document.getElementById("auth-phone")?.value.trim();
      const email=document.getElementById("auth-email")?.value.trim();
      const password=document.getElementById("auth-password")?.value;
      if(!name||!phone||!password){showToast("⚠️ Preencha nome, telefone e senha");return;}
      if(password.length<4){showToast("⚠️ Senha deve ter pelo menos 4 caracteres");return;}
      const r=await api.post("/auth/register",{name,phone:phone.replace(/\D/g,""),email,password});
      if(r.ok){authToken=r.token;localStorage.setItem("campy_token",r.token);currentUser=r.user;closeAuth();showToast("✅ Conta criada! Bem-vindo, "+r.user.name+"!");updateUserMenu();}
      else showToast("⚠️ "+r.error);
    }

    function doLogout(){authToken=null;currentUser=null;localStorage.removeItem("campy_token");updateUserMenu();showToast("Logout realizado");closeUserMenu();}

    function updateUserMenu(){
      const btn=document.getElementById("btn-user");
      const menu=document.getElementById("user-menu-content");
      if(currentUser){
        btn.innerHTML=`<div class="user-avatar">${currentUser.name[0]}</div>`;
        menu.innerHTML=`
          <div style="padding:8px 12px;border-bottom:1px solid var(--pc-border);margin-bottom:4px"><div style="font-weight:600;font-size:14px">${currentUser.name}</div><div style="font-size:11px;color:var(--pc-text-muted)">${currentUser.phone}</div></div>
          <div class="user-menu-item" onclick="showView('orders');loadMyOrders();closeUserMenu()"><i class="ph ph-receipt"></i> Meus Pedidos</div>
          <div class="user-menu-divider"></div>
          <div class="user-menu-item" onclick="doLogout()" style="color:var(--pc-accent)"><i class="ph ph-sign-out"></i> Sair</div>`;
      } else {
        btn.innerHTML=`<i class="ph ph-user"></i>`;
        menu.innerHTML=`
          <div class="user-menu-item" onclick="openAuth();closeUserMenu()"><i class="ph ph-sign-in"></i> Entrar</div>
          <div class="user-menu-item" onclick="showAuthTab('register');openAuth();closeUserMenu()"><i class="ph ph-user-plus"></i> Criar Conta</div>`;
      }
    }

    function openAuth(){document.getElementById("auth-panel").classList.add("active");showAuthTab("login");}
    function closeAuth(){document.getElementById("auth-panel").classList.remove("active");}
    function toggleUserMenu(){document.getElementById("user-menu").classList.toggle("active");}
    function closeUserMenu(){document.getElementById("user-menu").classList.remove("active");}

    // ====== INIT ======
    async function init(){
      await loadMenu();renderTabs();renderMenu();updateCartBadge();
      document.getElementById("btn-cart").onclick=openCart;
      document.getElementById("btn-orders").onclick=()=>{showView("orders");currentUser?loadMyOrders():loadOrdersByPhone();};
      document.getElementById("btn-user").onclick=toggleUserMenu;
      document.getElementById("modal-item").onclick=e=>{if(e.target===e.currentTarget)closeModal("modal-item");};
      document.getElementById("cart-panel").onclick=e=>{if(e.target===e.currentTarget)closeCart();};
      document.getElementById("btn-whatsapp").onclick=()=>window.open("https://wa.me/5500000000000?text=Olá! Gostaria de fazer um pedido!","_blank");
      document.addEventListener("click",e=>{if(!e.target.closest("#btn-user")&&!e.target.closest("#user-menu"))closeUserMenu();});
      if(authToken){const r=await api.get("/auth/me",true);if(r.ok)currentUser=r.user;}
      updateUserMenu();renderAuthForm();
    }

    async function loadMenu(){const d=await api.get("/menu");if(d.ok)menuItems=d.items;}
    function showView(n){currentView=n;["menu","orders","tracking","success"].forEach(v=>{document.getElementById("view-"+v).classList.toggle("hidden",v!==n);});}
    function renderTabs(){const cats=[...new Set(menuItems.map(i=>i.category))];document.getElementById("tabs").innerHTML=`<div class="tab ${currentCategory==="all"?"active":""}" onclick="setCategory('all')">Todos</div>${cats.map(c=>{const info=CATEGORY_MAP[c]||{label:c,emoji:"📋"};return`<div class="tab ${currentCategory===c?"active":""}" onclick="setCategory('${c}')"><span class="cat-emoji">${info.emoji}</span>${info.label}</div>`;}).join("")}`;}
    function setCategory(c){currentCategory=c;renderTabs();renderMenu();}
    function renderMenu(){const f=currentCategory==="all"?menuItems:menuItems.filter(i=>i.category===currentCategory);const g=document.getElementById("menu-grid");if(!f.length){g.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🍕</div><div class="empty-state-text">Nenhum item encontrado</div></div>`;return;}g.innerHTML=f.map(item=>{const cat=CATEGORY_MAP[item.category]||{emoji:"📋"};return`<div class="menu-item" onclick="openItemModal('${item.id}')"><div class="menu-item-img">${cat.emoji}</div><div class="menu-item-info"><div class="menu-item-name">${item.name}</div><div class="menu-item-desc">${item.description||""}</div><div class="menu-item-footer"><div class="menu-item-price">R$ ${item.price.toFixed(2)}</div><button class="add-btn" onclick="event.stopPropagation();quickAdd('${item.id}')"><i class="ph ph-plus"></i></button></div></div></div>`;}).join("");}
    function openItemModal(id){const item=menuItems.find(i=>i.id===id);if(!item)return;selectedItem=item;selectedSize=item.sizes?Object.keys(item.sizes)[0]:null;selectedQty=1;const body=document.getElementById("modal-item-body");const cat=CATEGORY_MAP[item.category]||{emoji:"📋"};let ss="";if(item.sizes){ss=`<div class="size-selector">${Object.entries(item.sizes).map(([s,p],i)=>`<div class="size-btn ${i===0?"active":""}" onclick="selectSize('${s}',${p},this)"><div class="size-btn-label">${s}</div><div class="size-btn-price">R$ ${p.toFixed(2)}</div></div>`).join("")}</div>`;}body.innerHTML=`<div class="modal-item-img">${cat.emoji}</div><div class="modal-item-name">${item.name}</div><div class="modal-item-desc">${item.description||""}</div>${ss}<div class="qty-row"><button class="qty-btn" onclick="changeQty(-1)"><i class="ph ph-minus"></i></button><span class="qty-value" id="qty-value">${selectedQty}</span><button class="qty-btn" onclick="changeQty(1)"><i class="ph ph-plus"></i></button></div><label class="notes-label">Observações (opcional)</label><textarea class="notes-input" id="item-notes" placeholder="Ex: Sem cebola..."></textarea><button class="add-to-cart-btn" onclick="addToCart()">Adicionar — R$ <span id="modal-total">${getItemTotal().toFixed(2)}</span></button>`;document.getElementById("modal-item").classList.add("active");}
    function selectSize(s,p,el){selectedSize=s;document.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));el.classList.add("active");document.getElementById("modal-total").textContent=getItemTotal().toFixed(2);}
    function changeQty(d){selectedQty=Math.max(1,Math.min(99,selectedQty+d));document.getElementById("qty-value").textContent=selectedQty;document.getElementById("modal-total").textContent=getItemTotal().toFixed(2);}
    function getItemTotal(){if(!selectedItem)return 0;const bp=selectedSize&&selectedItem.sizes?selectedItem.sizes[selectedSize]:selectedItem.price;return bp*selectedQty;}
    function addToCart(){const notes=document.getElementById("item-notes")?.value||"";const price=selectedSize&&selectedItem.sizes?selectedItem.sizes[selectedSize]:selectedItem.price;cart.push({id:selectedItem.id,name:selectedItem.name,qty:selectedQty,price,size:selectedSize,notes,category:selectedItem.category});updateCartBadge();closeModal("modal-item");showToast(`${selectedItem.name} adicionado!`);}
    function quickAdd(id){const item=menuItems.find(i=>i.id===id);if(!item)return;cart.push({id:item.id,name:item.name,qty:1,price:item.price,size:item.sizes?Object.keys(item.sizes)[0]:null,notes:"",category:item.category});updateCartBadge();showToast(`${item.name} adicionado!`);}
    function updateCartBadge(){const b=document.getElementById("cart-badge");const t=cart.reduce((s,i)=>s+i.qty,0);b.textContent=t;b.classList.toggle("hidden",t===0);}

    function openCart(){
      const body=document.getElementById("cart-body");
      if(!cart.length){body.innerHTML=`<div class="empty-state"><div class="empty-state-icon">🛒</div><div class="empty-state-text">Carrinho vazio</div></div>`;document.getElementById("cart-panel").classList.add("active");return;}
      const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);const fee=sub>=80?0:5.90;const total=sub+fee;
      body.innerHTML=`<div class="cart-items">${cart.map((i,idx)=>`<div class="cart-item"><div class="cart-item-info"><div class="cart-item-name">${i.name}</div><div class="cart-item-detail">${i.size||""}${i.notes?" • "+i.notes:""}</div></div><div class="cart-item-qty"><button class="cart-qty-btn" onclick="cartQty(${idx},-1)">−</button><span style="font-weight:600">${i.qty}</span><button class="cart-qty-btn" onclick="cartQty(${idx},1)">+</button></div><div class="cart-item-price">R$ ${(i.price*i.qty).toFixed(2)}</div></div>`).join("")}</div>
      <div class="cart-summary"><div class="summary-row"><span class="summary-label">Subtotal</span><span class="summary-value">R$ ${sub.toFixed(2)}</span></div><div class="summary-row"><span class="summary-label">Entrega</span><span class="summary-value">${fee===0?"Grátis!":"R$ "+fee.toFixed(2)}</span></div>${fee===0?'<div style="font-size:11px;color:var(--pc-success);margin-bottom:8px">🎉 Frete grátis acima de R$ 80</div>':''}<div class="summary-row total"><span>Total</span><span class="summary-total-value">R$ ${total.toFixed(2)}</span></div></div>
      <div class="checkout-form">
        <div class="form-group"><label class="form-label">Nome completo *</label><input class="form-input" id="cust-name" placeholder="Seu nome" ${currentUser?'value="'+currentUser.name+'"':""} /></div>
        <div class="form-group"><label class="form-label">Telefone *</label><input class="form-input" id="cust-phone" placeholder="(XX) XXXXX-XXXX" maxlength="15" oninput="this.value=maskPhone(this.value)" ${currentUser?'value="'+maskPhone(currentUser.phone)+'"':""} /></div>
        <div class="form-group"><label class="form-label">CEP *</label><div style="display:flex;gap:8px"><input class="form-input" id="cust-cep" placeholder="00000-000" maxlength="9" style="flex:1" oninput="this.value=maskCEP(this.value)" onblur="handleCEPLookup()" /><button type="button" class="add-btn" onclick="handleCEPLookup()" style="width:44px;height:44px;flex-shrink:0"><i class="ph ph-magnifying-glass"></i></button></div><div id="cep-status" style="font-size:11px;color:var(--pc-text-muted);margin-top:4px;min-height:16px"></div></div>
        <div class="form-group"><label class="form-label">Rua / Avenida *</label><input class="form-input" id="cust-street" placeholder="Rua Example" /></div>
        <div style="display:flex;gap:10px"><div class="form-group" style="flex:0 0 100px"><label class="form-label">Número *</label><input class="form-input" id="cust-number" placeholder="123" /></div><div class="form-group" style="flex:1"><label class="form-label">Complemento</label><input class="form-input" id="cust-complement" placeholder="Apt 101..." /></div></div>
        <div class="form-group"><label class="form-label">Bairro *</label><input class="form-input" id="cust-neighborhood" placeholder="Seu bairro" /></div>
        <div class="form-group"><label class="form-label">Pagamento *</label><div class="payment-methods">${PAYMENT_METHODS.map((pm,i)=>`<div class="payment-method ${i===0?"active":""}" onclick="selectPayment('${pm.key}',this)"><div class="payment-method-icon">${pm.icon}</div><div>${pm.label}</div></div>`).join("")}</div></div>
        <div class="form-group"><label class="form-label">Observações</label><textarea class="notes-input" id="order-notes" placeholder="Instruções para entrega..." rows="2"></textarea></div>
        <button class="checkout-btn" id="checkout-btn" onclick="placeOrder()">Finalizar Pedido — R$ ${total.toFixed(2)}</button>
        ${!currentUser?'<div style="text-align:center;margin-top:12px;font-size:12px;color:var(--pc-text-muted)">💡 <a onclick="openAuth()" style="color:var(--pc-accent);cursor:pointer">Faça login</a> para acompanhar seus pedidos</div>':''}
      </div>`;
      document.getElementById("cart-panel").classList.add("active");
    }
    function closeCart(){document.getElementById("cart-panel").classList.remove("active");}
    function cartQty(i,d){cart[i].qty+=d;if(cart[i].qty<=0)cart.splice(i,1);updateCartBadge();if(!cart.length){closeCart();return;}openCart();}
    function selectPayment(m,el){selectedPayment=m;document.querySelectorAll(".payment-method").forEach(b=>b.classList.remove("active"));el.classList.add("active");}

    async function placeOrder(){
      const name=document.getElementById("cust-name")?.value.trim()||"";
      const phone=document.getElementById("cust-phone")?.value.trim()||"";
      const cep=document.getElementById("cust-cep")?.value.trim()||"";
      const street=document.getElementById("cust-street")?.value.trim()||"";
      const number=document.getElementById("cust-number")?.value.trim()||"";
      const complement=document.getElementById("cust-complement")?.value.trim()||"";
      const neighborhood=document.getElementById("cust-neighborhood")?.value.trim()||"";
      const notes=document.getElementById("order-notes")?.value.trim()||"";
      const fullAddress=`${street}, ${number}${complement?" - "+complement:""}${cep?" CEP: "+cep:""}`;
      if(!name){showToast("⚠️ Preencha seu nome");return;}
      if(!phone||phone.replace(/\D/g,"").length<10){showToast("⚠️ Telefone inválido");return;}
      if(!street){showToast("⚠️ Preencha a rua");return;}
      if(!number){showToast("⚠️ Preencha o número");return;}
      if(!neighborhood){showToast("⚠️ Preencha o bairro");return;}
      if(!cart.length){showToast("⚠️ Adicione itens ao carrinho");return;}
      const btn=document.getElementById("checkout-btn");btn.disabled=true;btn.textContent="Processando...";
      const items=cart.map(i=>({itemId:i.id,name:i.name+(i.size?" ("+i.size+")":""),qty:i.qty,price:i.price,size:i.size,notes:i.notes}));
      try{
        const result=await api.post("/orders",{customerName:name,customerPhone:phone.replace(/\D/g,""),customerAddress:fullAddress,customerNeighborhood:neighborhood,items,paymentMethod:selectedPayment,notes});
        if(result.ok){cart=[];updateCartBadge();closeCart();showSuccess(result.order);}
        else{showToast("⚠️ "+(result.error||"Erro"));btn.disabled=false;btn.textContent="Finalizar Pedido";}
      }catch(e){showToast("❌ Erro de conexão");btn.disabled=false;btn.textContent="Finalizar Pedido";}
    }

    function showSuccess(order){document.getElementById("view-success").innerHTML=`<div class="success-screen"><div class="success-icon">🎉</div><div class="success-title">Pedido Recebido!</div><div class="success-subtitle">Seu pedido foi enviado com sucesso.${currentUser?"<br>Acompanhe em Meus Pedidos.":""}</div><div class="success-order-id">#${order.id}</div><div style="display:flex;flex-direction:column;gap:8px;max-width:280px;margin:0 auto"><button class="checkout-btn" onclick="trackOrder('${order.id}')" style="background:var(--pc-accent)"><i class="ph ph-map-pin"></i> Acompanhar</button><button class="checkout-btn" onclick="showView('menu')" style="background:var(--pc-surface-light);color:var(--pc-text)">Voltar ao Cardápio</button></div></div>`;showView("success");}

    async function trackOrder(id){const el=document.getElementById("view-tracking");el.innerHTML=`<div class="loading">Carregando...</div>`;showView("tracking");const data=await api.get("/orders/"+id);if(!data.ok){el.innerHTML=`<div class="empty-state"><div class="empty-state-text">Pedido não encontrado</div></div>`;return;}const o=data.order;const ci=STATUS_STEPS.findIndex(s=>s.key===o.status);el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2 style="font-size:18px;font-weight:700">Acompanhar Pedido</h2><button class="icon-btn" onclick="showView('menu')" style="width:auto;padding:8px 16px;border-radius:20px;font-size:13px"><i class="ph ph-arrow-left" style="margin-right:4px"></i> Voltar</button></div><div class="tracking-container"><div class="tracking-order-id">Pedido <span>#${o.id}</span></div><div class="tracking-steps">${STATUS_STEPS.map((s,idx)=>{const done=idx<ci;const active=idx===ci;return`<div class="tracking-step ${done?"completed":""} ${active?"active":""}"><div class="tracking-step-dot">${done?"✓":s.icon}</div><div class="tracking-step-label">${s.label}</div>${done?'<div class="tracking-step-time">Concluído</div>':''}${active?'<div class="tracking-step-time">Em andamento</div>':''}</div>`;}).join("")}</div><div class="order-card" style="margin-top:20px"><div class="order-card-items">${o.items.map(i=>`${i.qty}x ${i.name}`).join(" • ")}</div><div class="order-card-total">Total: R$ ${o.total.toFixed(2)}</div></div></div>`;}

    async function loadMyOrders(){
      const el=document.getElementById("orders-list");el.innerHTML=`<div class="loading">Carregando...</div>`;
      const data=await api.get("/auth/orders",true);
      if(!data.ok){el.innerHTML=`<div class="empty-state"><div class="empty-state-text">Erro ao carregar pedidos</div></div>`;return;}
      renderOrdersList(data.orders,el);
    }

    async function loadOrdersByPhone(){
      const el=document.getElementById("orders-list");
      const phone=localStorage.getItem("campy_phone");
      if(!phone){el.innerHTML=`<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-text">Faça login para ver seus pedidos</div><div style="margin-top:16px"><input class="form-input" id="phone-search" placeholder="(XX) XXXXX-XXXX" style="margin-bottom:8px" maxlength="15" oninput="this.value=maskPhone(this.value)" /><button class="checkout-btn" onclick="searchByPhone()" style="background:var(--pc-accent)">Buscar</button></div></div>`;return;}
      const data=await api.get("/orders?limit=20");
      if(!data.ok){el.innerHTML=`<div class="empty-state"><div class="empty-state-text">Erro</div></div>`;return;}
      const mine=data.orders.filter(o=>o.customerPhone?.replace(/\D/g,"")===phone.replace(/\D/g,""));
      renderOrdersList(mine,el);
    }

    function renderOrdersList(orders,el){
      if(!orders.length){el.innerHTML=`<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">Nenhum pedido encontrado</div></div>`;return;}
      el.innerHTML=orders.map(o=>`<div class="order-card" onclick="trackOrder('${o.id}')"><div class="order-card-header"><span class="order-card-id">#${o.id}</span><span class="order-card-status status-${o.status}">${STATUS_STEPS.find(s=>s.key===o.status)?.label||o.status}</span></div><div class="order-card-items">${o.items.map(i=>`${i.qty}x ${i.name}`).join(" • ")}</div><div style="display:flex;justify-content:space-between;align-items:center"><span class="order-card-total">R$ ${o.total.toFixed(2)}</span><span style="font-size:11px;color:var(--pc-text-muted)">${new Date(o.createdAt).toLocaleDateString("pt-BR")}</span></div></div>`).join("");
    }

    function searchByPhone(){const p=document.getElementById("phone-search").value.trim();if(p){localStorage.setItem("campy_phone",p.replace(/\D/g,""));loadOrdersByPhone();}}
    function renderAuthForm(){showAuthTab("login");}
    function closeModal(id){document.getElementById(id).classList.remove("active");}
    function showToast(msg){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

    init();
  </script>
</body>
</html>
